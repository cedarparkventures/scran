<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#18181b" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#18181b" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#18181b" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#18181b" stroke-width="1"/>

  <!-- Glow behind scan frame -->
  <ellipse cx="600" cy="315" rx="260" ry="180" fill="#4f46e5" fill-opacity="0.07"/>

  <!-- Scan frame (large, centered) -->
  <!-- Top-left corner -->
  <path d="M380 175 L380 135 L420 135" stroke="#4f46e5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top-right corner -->
  <path d="M780 135 L820 135 L820 175" stroke="#4f46e5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-left corner -->
  <path d="M380 455 L380 495 L420 495" stroke="#4f46e5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right corner -->
  <path d="M780 495 L820 495 L820 455" stroke="#4f46e5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Scan line (animated feel via gradient) -->
  <defs>
    <linearGradient id="scanline" x1="380" y1="0" x2="820" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="50%" stop-color="#34d399" stop-opacity="1"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <line x1="380" y1="315" x2="820" y2="315" stroke="url(#scanline)" stroke-width="2.5"/>

  <!-- Simulated text lines inside frame (OCR feel) -->
  <rect x="430" y="220" width="180" height="8" rx="4" fill="#27272a"/>
  <rect x="430" y="238" width="240" height="8" rx="4" fill="#27272a"/>
  <rect x="430" y="256" width="200" height="8" rx="4" fill="#27272a"/>
  <!-- Highlighted (scanned) lines -->
  <rect x="430" y="274" width="220" height="8" rx="4" fill="#4f46e5" fill-opacity="0.5"/>
  <rect x="430" y="292" width="160" height="8" rx="4" fill="#4f46e5" fill-opacity="0.5"/>

  <!-- Lines below scan line (not yet scanned) -->
  <rect x="430" y="335" width="200" height="8" rx="4" fill="#27272a"/>
  <rect x="430" y="353" width="240" height="8" rx="4" fill="#27272a"/>
  <rect x="430" y="371" width="180" height="8" rx="4" fill="#27272a"/>
  <rect x="430" y="389" width="220" height="8" rx="4" fill="#27272a"/>
  <rect x="430" y="407" width="140" height="8" rx="4" fill="#27272a"/>

  <!-- Small image placeholder (photo mode) -->
  <rect x="660" y="220" width="120" height="90" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
  <circle cx="690" cy="248" r="12" fill="#27272a"/>
  <path d="M660 285 L690 260 L720 278 L750 255 L780 285" stroke="#3f3f46" stroke-width="1.5" fill="none"/>

  <!-- Brand icon (left side) -->
  <rect x="80" y="255" width="52" height="52" rx="12" fill="#4f46e5"/>
  <!-- Scan corners inside brand icon -->
  <path d="M93 275 L93 267 L101 267" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M119 267 L127 267 L127 275" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M93 289 L93 297 L101 297" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M119 297 L127 297 L127 289" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="93" y1="281" x2="127" y2="281" stroke="#34d399" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Brand name -->
  <text x="148" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="-2" fill="#e4e4e7">Scran</text>

  <!-- Tagline -->
  <text x="148" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#71717a" letter-spacing="0.5">AI Page Scanner — Gemma 4 + WebGPU</text>

  <!-- Bottom badges -->
  <rect x="80" y="520" width="110" height="30" rx="6" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="135" y="540" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8" text-anchor="middle">Auto Detect</text>

  <rect x="202" y="520" width="80" height="30" rx="6" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="242" y="540" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8" text-anchor="middle">Photo</text>

  <rect x="294" y="520" width="100" height="30" rx="6" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="344" y="540" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8" text-anchor="middle">Text / OCR</text>

  <rect x="406" y="520" width="80" height="30" rx="6" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="446" y="540" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8" text-anchor="middle">Mixed</text>

  <!-- "Runs in your browser" badge -->
  <rect x="900" y="520" width="220" height="30" rx="6" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <circle cx="918" cy="535" r="4" fill="#34d399"/>
  <text x="930" y="540" font-family="system-ui, sans-serif" font-size="12" fill="#34d399">Runs entirely in your browser</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7" fill="#09090b"/>
  <!-- Scan frame corners (indigo) -->
  <!-- Top-left -->
  <path d="M6 12 L6 6 L12 6" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top-right -->
  <path d="M20 6 L26 6 L26 12" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-left -->
  <path d="M6 20 L6 26 L12 26" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right -->
  <path d="M20 26 L26 26 L26 20" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scan line (green = ready/active) -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 2"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#818cf8"/>
</svg>
